services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"

  backend:
    build: .
    environment:
      DB_HOST: db
    command: >
      sh -c "
      sleep 3 &&
      python manage.py migrate &&
      python manage.py seed  &&
      python manage.py sync_nvd &&
      python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
